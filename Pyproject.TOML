[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fractalyx-vault"
version = "3.0.0"
description = "Criptografía basada en el Modelo Fractal-Estocástico Unificado (MFSU)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Fracta-Axis", email = "fracta@axis.dev" }]
keywords = ["cryptography", "fractal", "mfsu", "encryption", "kdf"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
]

dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
]

[project.optional-dependencies]
ui = ["streamlit>=1.30", "matplotlib>=3.7"]
dev = ["pytest>=7.4", "pytest-cov>=4.1", "ruff>=0.1"]

[project.scripts]
fractalyx-vault = "fractalyx.cli.__main__:main"

[project.urls]
Homepage = "https://github.com/Fracta-Axis/Fractalyx"
Repository = "https://github.com/Fracta-Axis/Fractalyx"

[tool.hatch.build.targets.wheel]
packages = ["Fractalyx"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
